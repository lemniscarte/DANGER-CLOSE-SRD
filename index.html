<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DANGER CLOSE — System Reference Document</title>
  <meta name="description" content="The Systems Reference Document for the DANGER CLOSE tabletop wargame by Dice Goblin Games." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* Karrik — Velvetyne (libre) */
    @font-face {
      font-family: "Karrik";
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url("https://velvetyne.fr/fonts/karrik/webfonts/Karrik-Regular.woff2") format("woff2");
    }
    @font-face {
      font-family: "Karrik";
      font-style: italic;
      font-weight: 400;
      font-display: swap;
      src: url("https://velvetyne.fr/fonts/karrik/webfonts/Karrik-Italic.woff2") format("woff2");
    }
    /* Council is not libre — we fall back to EB Garamond which has similar
       sturdy-humanist-serif character and reads beautifully at body size. */
  </style>
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script>
    // EDITMODE tweak defaults — host rewrites this block on Tweak changes.
    window.__TWEAKS = /*EDITMODE-BEGIN*/{
      "paper": "#ffffff",
      "paper2": "#f5f5f2",
      "paperEdge": "#e6e6e0",
      "ink": "#1a1814",
      "rule": "#dcdcd2",
      "accent": "#e00000",
      "bodyFont": "outfit",
      "headingFont": "karrik",
      "bodySize": 16
    }/*EDITMODE-END*/;
  </script>
</head>
<body>

  <div class="app">

    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-title">Danger Close</div>
        <div class="brand-sub">System Reference Document</div>
        <div class="brand-version">v0.96.8 · CC BY-SA 4.0</div>
      </div>

      <div id="nav"></div>

      <div class="sidebar-section">
        <button class="theme-toggle" id="theme-toggle" type="button">☾ Dark mode</button>
      </div>
    </aside>

    <main>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
      <div class="mobile-bar">
        <button class="menu-btn" id="menu-btn" aria-label="Open menu">☰ Menu</button>
        <div class="brand-title" id="mobile-chapter">Danger Close</div>
        <span style="width: 48px"></span>
      </div>
      <div class="content" id="content"></div>
    </main>

  </div>

  <!-- Tweaks panel (hidden until activated by host) -->
  <aside class="tweaks-panel" id="tweaks-panel" hidden>
    <div class="tweaks-head">
      <span class="tweaks-title">Tweaks</span>
      <button class="tweaks-close" id="tweaks-close" aria-label="Close tweaks">✕</button>
    </div>
    <div class="tweaks-body">
      <fieldset class="tweak-group">
        <legend>Paper</legend>
        <div class="tweak-row">
          <label for="tw-preset">Preset</label>
          <select id="tw-preset">
            <option value="white">Bright white</option>
            <option value="offwhite">Warm off-white</option>
            <option value="paper">Light paper</option>
            <option value="cream">Original cream</option>
            <option value="custom">Custom…</option>
          </select>
        </div>
        <div class="tweak-row">
          <label for="tw-paper">Background</label>
          <input type="color" id="tw-paper" />
        </div>
        <div class="tweak-row">
          <label for="tw-ink">Ink</label>
          <input type="color" id="tw-ink" />
        </div>
        <div class="tweak-row">
          <label for="tw-accent">Accent</label>
          <input type="color" id="tw-accent" />
        </div>
      </fieldset>

      <fieldset class="tweak-group">
        <legend>Typography</legend>
        <div class="tweak-row">
          <label for="tw-body-font">Body font</label>
          <select id="tw-body-font">
            <option value="outfit">Outfit</option>
            <option value="karrik">Karrik</option>
            <option value="council">Council (EB Garamond fallback)</option>
            <option value="lora">Lora</option>
            <option value="garamond">EB Garamond</option>
            <option value="system-serif">System serif</option>
            <option value="system-sans">System sans</option>
          </select>
        </div>
        <div class="tweak-row">
          <label for="tw-head-font">Heading font</label>
          <select id="tw-head-font">
            <option value="karrik">Karrik</option>
            <option value="outfit">Outfit</option>
            <option value="council">Council</option>
            <option value="system-sans">System sans</option>
          </select>
        </div>
        <div class="tweak-row">
          <label for="tw-body-size">Body size</label>
          <input type="range" id="tw-body-size" min="14" max="22" step="1" />
          <output id="tw-body-size-out">17px</output>
        </div>
      </fieldset>

      <div class="tweak-actions">
        <button class="tweak-reset" id="tweak-reset" type="button">Reset to defaults</button>
      </div>
    </div>
  </aside>

  <script src="js/toc.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/tooltips.js"></script>
  <script src="js/squad.js"></script>
  <script src="js/tweaks.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
